name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

      - name: Run tests
        run: pytest

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set image tags
        id: image
        shell: bash
        run: |
          echo "sha=${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build --tag "${{ steps.image.outputs.sha }}" .

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push SHA image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "${{ steps.image.outputs.sha }}"

      - name: Tag latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker tag "${{ steps.image.outputs.sha }}" "${{ steps.image.outputs.latest }}"

      - name: Push latest image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "${{ steps.image.outputs.latest }}"
